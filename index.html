<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="5d0f727fce697af8ae797e3f58217920">
  
<title>CDN2.SLICEDRIVE.CLOUD</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
}

video{
width:100%;
height:100vh;
object-fit:contain;
background:#000;
}

#error{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-family:sans-serif;
font-size:18px;
text-align:center;
display:none;
padding:20px;
}

</style>

<script src="https://countyrecyclefailed.com/df/e4/73/dfe473d375e98f01070d5f58d8b8ae13.js"></script>

</head>

<body>

<video
id="player"
controls
playsinline
controlsList="nodownload noremoteplayback"
disablePictureInPicture>
</video>

<div id="error"></div>

<script>

// =====================================
// JSON REPOSITORY
// =====================================

const JSON_URL =
"https://raw.githubusercontent.com/liwa22/json/refs/heads/main/Video.json";

// =====================================
// DIRECT LINK
// =====================================

const DIRECT_LINK =
"https://omg10.com/4/11072185";

// =====================================

const video = document.getElementById("player");
const errorBox = document.getElementById("error");

let clicked = false;
let redirected = false;

// =====================================
// AMBIL ID VIDEO DARI URL
// =====================================

const path =
location.hash.slice(1) || location.pathname;

const id =
decodeURIComponent(
path.replace(/^\/+/, "")
);

// =====================================
// VALIDASI ID
// =====================================

if(!id){

errorBox.style.display = "block";
errorBox.innerHTML = "ID video tidak ditemukan";

throw new Error("ID kosong");

}

// =====================================
// AMBIL JSON
// =====================================

fetch(JSON_URL)

.then(async(res)=>{

if(!res.ok){

throw new Error("Gagal mengambil JSON");

}

return res.json();

})

.then(videos=>{

if(!Array.isArray(videos)){

throw new Error("Format JSON tidak valid");

}

// =====================================
// CARI VIDEO
// =====================================

const selected = videos.find(v =>
v.id === id ||
v.id + ".mp4" === id
);

// =====================================
// JIKA TIDAK ADA
// =====================================

if(!selected){

errorBox.style.display = "block";
errorBox.innerHTML = "Video tidak ditemukan";

return;

}

// =====================================
// SET VIDEO
// =====================================

if(!selected.Url){

errorBox.style.display = "block";
errorBox.innerHTML = "URL video tidak ditemukan";

return;

}

video.src = selected.Url + "#t=1.0";

video.load();

})

.catch(err=>{

console.error(err);

errorBox.style.display = "block";
errorBox.innerHTML = "Gagal memuat data video";

});

// =====================================
// REDIRECT KLIK PERTAMA
// =====================================

video.addEventListener("click",()=>{

if(!clicked){

clicked = true;

window.location.href = DIRECT_LINK;

}

},{ once:true });

// =====================================
// REDIRECT 30 DETIK
// =====================================

video.addEventListener("timeupdate",()=>{

if(
!redirected &&
video.currentTime >= 30
){

redirected = true;

window.location.href = DIRECT_LINK;

}

});

// =====================================
// DISABLE RIGHT CLICK
// =====================================

document.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

</script>

</body>
</html>
